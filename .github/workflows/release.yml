name: release

# 打 tag（v*）或手动触发 → 三平台构建并发布到 GitHub Release（草稿）。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# 创建 Release 需要写权限
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux 依赖
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装前端依赖
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自动更新签名：私钥与密码存在 GitHub Secrets。
          # tauri.conf.json 已配 createUpdaterArtifacts:true + 公钥，构建时生成 .sig 与 latest.json。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 证书/公证（可选；配好后补 secrets 即生效）：
          #   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          #   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BidGuard ${{ github.ref_name }}"
          releaseBody: "原本 · 标书查重 —— 本地标书交叉比对与围标识别。发布草稿后 latest.json 才对旧版本生效。"
          releaseDraft: true
          prerelease: false
          # 生成并上传 latest.json（自动更新清单）
          includeUpdaterJson: true
          args: ${{ matrix.args }}
